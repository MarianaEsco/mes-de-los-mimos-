<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mes de los Mimos</title>

<style>

body{

margin:0;

padding:0;

font-family:Arial,sans-serif;

background:linear-gradient(180deg,#fff,#ffeaf2);

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

}

.card{

width:90%;

max-width:430px;

background:white;

border-radius:25px;

padding:30px;

box-shadow:0 15px 40px rgba(0,0,0,.15);

text-align:center;

}

.logo{

width:180px;

margin:auto;

display:block;

margin-bottom:20px;

}

h1{

color:#ff4f8a;

margin-bottom:5px;

}

h2{

color:#777;

font-size:18px;

font-weight:normal;

margin-top:0;

}

.frase{

margin:25px 0;

font-size:18px;

color:#555;

}

.regalo{

font-size:90px;

cursor:pointer;

transition:.3s;

}

.regalo:hover{

transform:scale(1.1);

}

button{

background:#ff4f8a;

color:white;

padding:15px 35px;

border:none;

border-radius:40px;

font-size:18px;

cursor:pointer;

margin-top:20px;

}

#premio{

display:none;

margin-top:30px;

font-size:25px;

font-weight:bold;

color:#ff4f8a;

}

#whatsapp{

display:none;

margin-top:20px;

text-decoration:none;

}

</style>

</head>

<body>

<div class="card">

<img class="logo" src="logo.png">

<h1>MES DE LOS MIMOS</h1>

<h2>Mariana Escobar Cosmetología Integral</h2>

<p class="frase">

Porque cuidarte también es regalarte un mimo 💖

</p>

<div class="regalo" onclick="abrir()">

🎁

</div>

<p>Tocá el regalo para descubrir tu sorpresa</p>

<div id="premio"></div>

<a

id="whatsapp"

href="https://wa.me/5493644223164?text=Hola%20Mariana!%20Descubr%C3%AD%20mi%20mimo%20y%20quiero%20reservar%20mi%20turno."

target="_blank">

<button>

Reservar mi turno

</button>

</a>
<script>

const premios = [

"💋 Revitalización Labial",

"✨ Dermaplaning con 50% OFF",

"🌸 Radiofrecuencia Facial",

"🤎 Perfilado de Cejas",

"💧 Shock de Hidratación Facial",

"🎀 20% OFF en cualquier tratamiento",

"🌟 Ultrasonido Facial",

"💉 Dermapen con activos al 50% OFF"

];

function abrir(){

const premio = premios[Math.floor(Math.random()*premios.length)];

document.querySelector(".regalo").innerHTML="✨";

document.getElementById("premio").style.display="block";

document.getElementById("premio").innerHTML="🎉 ¡Felicitaciones!<br><br><strong>Tu mimo es:</strong><br><br>"+premio;

document.getElementById("whatsapp").style.display="inline-block";

}

</script>
</body>

</html>
